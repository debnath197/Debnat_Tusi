<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ⚠️ PAGE 2 & PAGE 3 তোমার আগের মতোই থাকবে */

/* ================= PAGE 4 ================= */

#page4{
  display:none;
  height:100vh;
  background:url("bg2.jpg") center/cover no-repeat;
  position:relative;
}

/* 💖 HUGE LOVE SYMBOL */

.love-main img{
  width:420px;
  margin-top:30px;
  animation:pulse 2s infinite;
  cursor:pointer;
}

/* ROUND IMAGE STYLE */

.mem{
  position:absolute;
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid white;
  box-shadow:0 0 20px #ff4d6d;
  display:none;
}

/* 🎯 IMAGE POSITIONS (GRASS + BUILDING TOP) */

.img1{ bottom:40px; left:40px; }      /* grass left */
.img2{ bottom:60px; right:40px; }     /* grass right */

.img3{ top:160px; left:120px; }       /* building left */
.img4{ top:160px; right:120px; }      /* building right */

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <!-- তোমার আগের Page-2 same -->
</div>

<!-- PAGE 3 -->
<div id="page3">
  <!-- তোমার আগের Page-3 same -->

  <div class="td-btn" onclick="openPage4()">TD 💖</div>
</div>

<!-- PAGE 4 -->

<div id="page4">

  <div class="love-main">
    <img src="love.png" onclick="showMemories()">
  </div>

  <img src="image1.jpg" class="mem img1">
  <img src="image2.jpg" class="mem img2">
  <img src="image3.jpg" class="mem img3">
  <img src="image4.jpg" class="mem img4">

</div>

<script>

/* NAVIGATION */

function openPage2(){
  page1.style.display="none";
  page2.style.display="block";
}

function openPage3(){
  page2.style.display="none";
  page3.style.display="block";
}

function openPage4(){
  page3.style.display="none";
  page4.style.display="block";
}

/* SHOW MEMORY IMAGES */

function showMemories(){
  document.querySelectorAll(".mem").forEach(img=>{
    img.style.display="block";
  });
}

</script>

</body>
</html>
