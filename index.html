<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
  overflow:hidden;
}

/* PAGE LAYER SYSTEM */
#page1,#page2,#page3,#page4{
  position:absolute;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  display:none;
}
#page1{ display:block; }

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:1000;
}

/* ✅ PAGE 1 IMAGE FULL SHOW */
.main-img{
  width:100%;
  height:100vh;
  object-fit:contain;
  object-position:center;
  background:black;
}

/* 💖 FIRST PAGE POEM DESIGN */
.poem-box{
  position:absolute;
  top:90px;
  left:20px;
  width:58%;
  max-width:260px;
  color:white;
  font-size:17px;
  line-height:1.6;
  text-align:left;
  padding:14px 16px;
  border-radius:18px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);
  box-shadow:0 0 20px rgba(0,0,0,0.25);
}

/* ================= PAGE 2 ================= */
/* (UNCHANGED – tor previous working version) */

#page2{
  position:absolute;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
  animation:zoomBg 20s infinite alternate;
  filter:brightness(0.9);
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}

.left-card{
  position:absolute;
  top:50px;
  left:12px;
  width:58%;
  max-width:240px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:14px 10px;
  border-radius:18px;
  color:white;
  text-align:center;
}

.left-card h2{font-size:15px;}
.names{font-size:13px;margin:4px 0;}
.date{font-size:12px;}
.from-line{margin-top:4px;font-size:11px;}

.mini-frame{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:6px;
}

.mini-frame img{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid white;
  object-fit:cover;
}

.love-counter{
  margin-top:6px;
  font-size:11px;
  line-height:1.4;
}

.side-love-text{
  position:absolute;
  bottom:140px;
  width:100%;
  text-align:center;
  font-size:26px;
  color:white;
  font-weight:bold;
}

.memory-line{
  position:absolute;
  bottom:110px;
  width:100%;
  text-align:center;
  color:white;
  font-size:16px;
}

/* ================= PAGE 3 & 4 ================= */
/* EXACTLY SAME – unchanged */

#page3{
  background:url("poem1.jpg") center/cover no-repeat;
}

.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
}

.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
}

#page4{
  background:url("bg2.jpg") center/cover no-repeat;
  perspective:1500px;
  overflow:hidden;
}

/* ================= HTML ================= */

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">

  <img src="TAJ.jpeg" class="main-img">

  <div class="poem-box">
    তুমি আমার সকালবেলার নরম রোদ্দুর,<br>
    তুমি চুপিচুপি ভালোবাসার সুর।<br>
    তোমার চোখে হারিয়ে গেলে মনে হয়—<br>
    এই জীবনটা শুধু তোমারই হোক ভরপুর 💖
  </div>

  <div class="td-btn" onclick="showPage('page2')">TD 💖</div>

</div>

<!-- PAGE 2 / 3 / 4 SAME AS BEFORE (UNCHANGED) -->

<script>
function showPage(page){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="none";
  document.getElementById("page3").style.display="none";
  document.getElementById("page4").style.display="none";
  document.getElementById(page).style.display="block";
}
</script>

</body>
</html>
