<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* PAGE 2 */
#page2{
  display:none;
  height:100vh;
  background:url("tusi bari.jpeg") center/cover no-repeat;
  position:relative;
}

.anniversary-box{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  padding:15px 35px;
  border-radius:20px;
  color:white;
  font-size:34px;
  font-weight:bold;
}

/* PAGE 3 POEM BACKGROUND */
#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

/* DARK OVERLAY */
#page3::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

/* POEM TEXT */
.poem-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:420px;
  color:white;
  font-size:18px;
  line-height:1.8;
  z-index:2;
}

/* HEART ANIMATION */
.heart{
  position:absolute;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  color:#ff4d6d;
  animation:float 5s infinite;
  z-index:2;
}

@keyframes float{
  0%{transform:translateY(-50%) translateX(0);}
  50%{transform:translateY(-60%) translateX(-10px);}
  100%{transform:translateY(-50%) translateX(0);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <div class="anniversary-box">❤️ OUR 1st Anniversary ❤️</div>
  <div class="td-btn" onclick="openPage3()">TD 💖</div>
</div>

<!-- PAGE 3 -->
<div id="page3">

  <div class="poem1-box">
    One year with you, my sweetest light,<br>
    Every moment feels so right.<br><br>

    In your smile I found my home,<br>
    No more lonely roads to roam.<br><br>

    Like ink on pages, our story stays,<br>
    Written in love for endless days.<br><br>

    Happy 1st Anniversary my love 💖
  </div>

  <div class="heart">💖 💕 💖</div>

</div>

<script>

function openPage2(){
  page1.style.display="none";
  page2.style.display="block";
}

function openPage3(){
  page2.style.display="none";
  page3.style.display="block";
}

</script>

</body>
</html>
