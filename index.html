<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ================= PAGE 2 ================= */
/* তোমার আগের Page-2 same রাখা হয়েছে */

#page2{
  display:none;
  height:100vh;
  position:relative;
  overflow:hidden;
}

.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* LEFT CARD */
.left-card{
  position:absolute;
  top:50%;
  left:30px;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:30px 25px;
  border-radius:25px;
  color:white;
  text-align:left;
  border-left:4px solid #ff4d6d;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
  animation:cardGlow 3s infinite alternate;
}

@keyframes cardGlow{
  from{box-shadow:0 0 15px rgba(255,255,255,0.3);}
  to{box-shadow:0 0 35px rgba(255,77,109,0.9);}
}

.names{font-size:22px;margin:10px 0;}
.date{font-size:18px;}
.from-line{margin-top:10px;font-size:15px;}

.mini-frame{display:flex;gap:8px;margin-top:12px;}
.mini-frame img{
  width:45px;height:45px;border-radius:50%;
  border:2px solid white;object-fit:cover;
  box-shadow:0 0 10px #ff4d6d;
}

.love-counter{
  margin-top:12px;
  font-size:15px;
  line-height:1.6;
  text-shadow:0 0 8px #ff4d6d;
}

/* RIGHT LOVE TEXT */
.side-love-text{
  position:absolute;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  font-size:42px;
  color:white;
  text-align:right;
  line-height:1.3;
  text-shadow:0 0 20px #ff4d6d;
  font-weight:bold;
}

.memory-line{
  position:absolute;
  bottom:110px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
  text-shadow:0 0 10px #ff4d6d;
}

/* FLOATING HEARTS */
.floating-hearts span{
  position:absolute;
  color:#ff4d6d;
  font-size:20px;
  animation:floatHeart 6s linear infinite;
}

@keyframes floatHeart{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* ================= PAGE 3 ================= */

#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
  text-align:center;
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #fff;}
  to{box-shadow:0 0 30px #ff4d6d;}
}

.location{
  font-size:26px;
  margin-bottom:6px;
}

/* PETALS */
.petals{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

.petal{
  position:absolute;
  top:-20px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

/* ================= PAGE 4 ================= */

#page4{
  display:none;
  height:100vh;
  background:url("bg2.jpg") center/cover no-repeat;
}

.love-main img{
  width:220px;
  margin-top:120px;
  cursor:pointer;
  animation:pulse 2s infinite;
}

.gallery{
  display:none;
  margin-top:40px;
}

.gallery img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin:10px;
  box-shadow:0 0 15px #ff4d6d;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
<div class="bg-zoom"></div>

<div class="left-card">
  <h2>❤️ Our 1st Anniversary ❤️</h2>
  <div class="names">Debnath 💖 Tusi</div>
  <div class="date">06 / 03 / 2026</div>
  <div class="from-line">📍 From 06-03-2025 → Forever ♾️</div>

  <div class="mini-frame">
    <img src="my.jpg">
    <img src="wife.jpg">
  </div>

  <div class="love-counter">
    ⏳ <span id="days"></span> Days<br>
    ⏱️ <span id="hours"></span> Hours<br>
    💞 <span id="minutes"></span> Minutes
  </div>
</div>

<div class="side-love-text">
One Year <br> Of <br> Endless Love 💖
</div>

<p class="memory-line">365 Days of Togetherness 💞</p>

<div class="floating-hearts"></div>

<div class="td-btn pulse" onclick="openPage3()">TD 💖</div>

</div>

<!-- PAGE 3 -->
<div id="page3">

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="poem1-box"><span id="typing"></span></div>

<div class="couple-left">
<div class="location">📍</div>
<img src="my.jpg">
</div>

<div class="couple-right">
<div class="location">📍</div>
<img src="wife.jpg">
</div>

<div class="petals"></div>

<div class="td-btn" onclick="openPage4()">TD 💖</div>

</div>

<!-- PAGE 4 -->
<div id="page4">

<div class="love-main">
<img src="love.png" onclick="openGallery()">
</div>

<div class="gallery" id="gallery">
<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
</div>

</div>

<script>

function openPage2(){
page1.style.display="none";
page2.style.display="block";
}

function openPage3(){
page2.style.display="none";
page3.style.display="block";
document.getElementById("bgMusic").play();
startTyping();
}

function openPage4(){
page3.style.display="none";
page4.style.display="block";
}

function openGallery(){
document.getElementById("gallery").style.display="block";
}

/* LOVE TIMER */
const startDate = new Date("March 6, 2025");

setInterval(()=>{
const now = new Date();
const diff = now - startDate;

days.innerHTML = Math.floor(diff / (1000*60*60*24));
hours.innerHTML = Math.floor(diff / (1000*60*60));
minutes.innerHTML = Math.floor(diff / (1000*60));
},1000);

/* TYPING */
const text=`One year with you, my sweetest light,
Every moment feels so right.

In your smile I found my home,
No more lonely roads to roam.

Like ink on pages, our story stays,
Written in love for endless days.

Happy 1st Anniversary my love 💖`;

let i=0;
function startTyping(){
function type(){
if(i<text.length){
typing.innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();
}

/* PETALS */
setInterval(()=>{
const petal=document.createElement("div");
petal.classList.add("petal");
petal.innerHTML="🌹";
petal.style.left=Math.random()*100+"%";
petal.style.animationDuration=(3+Math.random()*5)+"s";
document.querySelector(".petals").appendChild(petal);
setTimeout(()=>petal.remove(),8000);
},300);

</script>

</body>
</html>
