<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ================= PAGE 2 ================= */

#page2{
  display:none;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* BACKGROUND ZOOM */
.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* ANNIVERSARY CARD */
.anniversary-card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:35px 25px;
  border-radius:25px;
  color:white;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.anniversary-card h1{
  margin:0;
  font-size:32px;
  text-shadow:0 0 15px #ff4d6d;
}

.names{
  font-size:22px;
  margin:15px 0 5px;
}

.date{
  font-size:18px;
}

/* FLOATING HEARTS */
.floating-hearts span{
  position:absolute;
  color:#ff4d6d;
  font-size:20px;
  animation:floatHeart 6s linear infinite;
}

@keyframes floatHeart{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* BUTTON PULSE */
.pulse{
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.08);}
  100%{transform:translateX(-50%) scale(1);}
}

/* ================= PAGE 3 ================= */

#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

/* POEM */
.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* GLOW PHOTOS */
.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
  text-align:center;
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #fff;}
  to{box-shadow:0 0 30px #ff4d6d;}
}

.location{
  font-size:26px;
  margin-bottom:6px;
}

/* PETALS */
.petals{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

.petal{
  position:absolute;
  top:-20px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">

  <div class="bg-zoom"></div>

  <div class="anniversary-card">
    <h1>❤️ Our 1st Anniversary ❤️</h1>
    <p class="names">Debnath 💖 Tusi</p>
    <p class="date">06 / 03 / 2025</p>
  </div>

  <div class="floating-hearts"></div>

  <div class="td-btn pulse" onclick="openPage3()">TD 💖</div>

</div>

<!-- PAGE 3 -->
<div id="page3">

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="poem1-box"><span id="typing"></span></div>

<div class="couple-left">
  <div class="location">📍</div>
  <img src="my.jpg">
</div>

<div class="couple-right">
  <div class="location">📍</div>
  <img src="wife.jpg">
</div>

<div class="petals"></div>

</div>

<script>

function openPage2(){
  page1.style.display="none";
  page2.style.display="block";
}

function openPage3(){
  page2.style.display="none";
  page3.style.display="block";
  document.getElementById("bgMusic").play();
  startTyping();
}

/* FLOATING HEARTS PAGE 2 */
setInterval(()=>{
  const heart=document.createElement("span");
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(4+Math.random()*3)+"s";
  document.querySelector(".floating-hearts").appendChild(heart);
  setTimeout(()=>heart.remove(),7000);
},800);

/* TYPING */
const text=`One year with you, my sweetest light,
Every moment feels so right.

In your smile I found my home,
No more lonely roads to roam.

Like ink on pages, our story stays,
Written in love for endless days.

Happy 1st Anniversary my love 💖`;

let i=0;
function startTyping(){
  function type(){
    if(i<text.length){
      document.getElementById("typing").innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,50);
    }
  }
  type();
}

/* PETALS */
setInterval(()=>{
  const petal=document.createElement("div");
  petal.classList.add("petal");
  petal.innerHTML="🌹";
  petal.style.left=Math.random()*100+"%";
  petal.style.animationDuration=(3+Math.random()*5)+"s";
  document.querySelector(".petals").appendChild(petal);
  setTimeout(()=>petal.remove(),8000);
},300);

</script>

</body>
</html>
