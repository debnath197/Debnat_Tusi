<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ================= PAGE 2 ================= */

#page2{
  display:none;
  height:100vh;
  position:relative;
  overflow:hidden;
}

.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
}

.left-card{
  position:absolute;
  top:50%;
  left:30px;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.15);
  padding:30px 25px;
  border-radius:25px;
  color:white;
  text-align:left;
  border-left:4px solid #ff4d6d;
}

.love-counter{
  margin-top:12px;
  font-size:16px;
  line-height:1.6;
}

/* ================= PAGE 3 ================= */

#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
}

.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
}

/* ================= PAGE 4 ================= */

#page4{
  display:none;
  height:100vh;
  background:url("bg2.jpg") center/cover no-repeat;
  position:relative;
}

.love-main{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.love-main img{
  width:350px;
  cursor:pointer;
}

.gallery{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
}

.gallery img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  position:absolute;
  box-shadow:0 0 20px #ff4d6d;
}

#img1{ top:30px; left:30px; }
#img2{ top:30px; right:30px; }
#img3{ bottom:30px; left:30px; }
#img4{ bottom:30px; right:30px; }

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
<div class="bg-zoom"></div>

<div class="left-card">
  <h2>❤️ Our 1st Anniversary ❤️</h2>
  <div class="names">Debnath 💖 Tusi</div>

  <div class="love-counter">
    ⏳ <span id="days"></span> Days<br>
    ⏱️ <span id="hours"></span> Hours<br>
    💞 <span id="minutes"></span> Minutes
  </div>
</div>

<div class="td-btn" onclick="openPage3()">TD 💖</div>
</div>

<!-- PAGE 3 -->
<div id="page3">

<div class="poem1-box">
  <span id="typing"></span>
</div>

<div class="couple-left">
<img src="my.jpg">
</div>

<div class="couple-right">
<img src="wife.jpg">
</div>

<div class="td-btn" onclick="openPage4()">TD 💖</div>

</div>

<!-- PAGE 4 -->
<div id="page4">

<div class="love-main">
<img src="love.png" onclick="openGallery()">
</div>

<div class="gallery" id="gallery">
<img src="image1.jpeg" id="img1">
<img src="image2.jpeg" id="img2">
<img src="image3.jpeg" id="img3">
<img src="image4.jpeg" id="img4">
</div>

</div>

<script>

/* PAGE SWITCH */
function openPage2(){
page1.style.display="none";
page2.style.display="block";
}

function openPage3(){
page2.style.display="none";
page3.style.display="block";
startTyping();
}

function openPage4(){
page3.style.display="none";
page4.style.display="block";
}

function openGallery(){
document.getElementById("gallery").style.display="block";
}

/* LOVE TIMER */
const startDate = new Date("March 6, 2025");

setInterval(()=>{
const now = new Date();
const diff = now - startDate;

document.getElementById("days").innerHTML = Math.floor(diff / (1000*60*60*24));
document.getElementById("hours").innerHTML = Math.floor(diff / (1000*60*60));
document.getElementById("minutes").innerHTML = Math.floor(diff / (1000*60));
},1000);

/* TYPING POEM */
const text=`One year with you, my sweetest light,
Every moment feels so right.

In your smile I found my home,
No more lonely roads to roam.

Like ink on pages, our story stays,
Written in love for endless days.

Happy 1st Anniversary my love 💖`;

let i=0;
function startTyping(){
document.getElementById("typing").innerHTML="";
i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();
}

</script>

</body>
</html>
