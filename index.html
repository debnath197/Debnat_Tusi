<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ================= PAGE 2 ================= */

#page2{
  display:none;
  height:100vh;
  position:relative;
  overflow:hidden;
}

.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

.left-card{
  position:absolute;
  top:50%;
  left:30px;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:30px 25px;
  border-radius:25px;
  color:white;
}

.love-counter{
  margin-top:12px;
  font-size:15px;
  line-height:1.6;
}

.side-love-text{
  position:absolute;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  font-size:42px;
  color:white;
  font-weight:bold;
}

.memory-line{
  position:absolute;
  bottom:110px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
}

/* ================= PAGE 3 ================= */

#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
}

.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
}

/* ================= PAGE 4 ================= */

#page4{
  display:none;
  height:100vh;
  background:url("bg2.jpg") center/cover no-repeat;
  position:relative;
  overflow:hidden;
  perspective:1200px;
}

/* Static Corner Images */
.corner-img{
  width:140px;
  height:180px;
  object-fit:cover;
  border-radius:20px;
  position:absolute;
  box-shadow:0 0 25px #ff4d6d;
}

#c1{ top:20px; left:20px; }
#c2{ top:20px; right:20px; }
#c3{ bottom:20px; left:20px; }
#c4{ bottom:20px; right:20px; }

/* 3D Carousel */
.memory-container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  height:300px;
  transform-style:preserve-3d;
  animation:rotate 25s linear infinite;
}

@keyframes rotate{
  from{transform:translate(-50%,-50%) rotateY(0deg);}
  to{transform:translate(-50%,-50%) rotateY(360deg);}
}

.memory-container img{
  position:absolute;
  width:200px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 25px rgba(255,77,109,0.8);
}

.memory-container img:nth-child(1){ transform:rotateY(0deg) translateZ(400px); }
.memory-container img:nth-child(2){ transform:rotateY(90deg) translateZ(400px); }
.memory-container img:nth-child(3){ transform:rotateY(180deg) translateZ(400px); }
.memory-container img:nth-child(4){ transform:rotateY(270deg) translateZ(400px); }

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
<div class="bg-zoom"></div>
<div class="left-card">
  <h2>❤️ Our 1st Anniversary ❤️</h2>
  <div class="love-counter">
    ⏳ <span id="days"></span> Days<br>
    ⏱️ <span id="hours"></span> Hours<br>
    💞 <span id="minutes"></span> Minutes
  </div>
</div>
<div class="td-btn" onclick="openPage3()">TD 💖</div>
</div>

<!-- PAGE 3 -->
<div id="page3">
<div class="poem1-box"><span id="typing"></span></div>
<div class="couple-left"><img src="my.jpg"></div>
<div class="couple-right"><img src="wife.jpg"></div>
<div class="td-btn" onclick="openPage4()">TD 💖</div>
</div>

<!-- PAGE 4 -->
<div id="page4">

<!-- Static Corners -->
<img src="image1.jpeg" class="corner-img" id="c1">
<img src="image2.jpeg" class="corner-img" id="c2">
<img src="image3.jpeg" class="corner-img" id="c3">
<img src="image4.jpeg" class="corner-img" id="c4">

<!-- 3D Rotating Center -->
<div class="memory-container">
<img src="image5.JPG">
<img src="image6.JPG">
<img src="image7.jpg">
<img src="image8.jpg">
</div>

</div>

<script>

function openPage2(){ page1.style.display="none"; page2.style.display="block"; }
function openPage3(){ page2.style.display="none"; page3.style.display="block"; startTyping(); }
function openPage4(){ page3.style.display="none"; page4.style.display="block"; }

const startDate = new Date("March 6, 2025");
setInterval(()=>{
const now = new Date();
const diff = now - startDate;
document.getElementById("days").innerHTML = Math.floor(diff / (1000*60*60*24));
document.getElementById("hours").innerHTML = Math.floor(diff / (1000*60*60));
document.getElementById("minutes").innerHTML = Math.floor(diff / (1000*60));
},1000);

const text=`Happy 1st Anniversary my love 💖`;
let i=0;
function startTyping(){
document.getElementById("typing").innerHTML="";
i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();
}

</script>

</body>
</html>
