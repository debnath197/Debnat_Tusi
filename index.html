<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  text-align:center;
  font-family:Segoe UI;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
  color:white;
}

/* Full image top */
.main-img{
  width:100%;
  max-height:80vh;
  object-fit:cover;
}

/* TD button */
.td-btn{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  display:inline-block;
  padding:12px 35px;
  border-radius:40px;
  transition:0.3s;
}

.td-btn:hover{
  background:#ffe0ea;
}

/* PAGE 2 BACKGROUND IMAGE */
#page2{
  display:none;
  height:100vh;
  background:url("tusi bari.jpeg") no-repeat;
  background-size:cover;
  background-position:center;
  position:relative;
}

/* ANNIVERSARY BOX */
.anniversary-box{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 35px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,0,98,0.6);
  animation:fadeSlide 2s ease;
}

/* ANNIVERSARY TEXT */
.anniversary-text{
  font-size:38px;
  font-weight:bold;
  background:linear-gradient(45deg,#ff0057,#ff8a00,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 10px rgba(255,255,255,0.8);
  letter-spacing:2px;
}

/* SUB TEXT */
.anniversary-sub{
  font-size:18px;
  color:white;
  margin-top:5px;
  letter-spacing:3px;
}

/* ANIMATION */
@keyframes fadeSlide{
  from{
    opacity:0;
    transform:translate(-50%,-50px);
  }
  to{
    opacity:1;
    transform:translate(-50%,0);
  }
}
