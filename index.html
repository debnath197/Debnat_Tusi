<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
}

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:10;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* PAGE 2 */
#page2{
  display:none;
  height:100vh;
  background:url("tusi bari.jpeg") center/cover no-repeat;
  position:relative;
}

.anniversary-box{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  padding:15px 35px;
  border-radius:20px;
  color:white;
  font-size:34px;
  font-weight:bold;
}

/* PAGE 3 */
#page3{
  display:none;
  height:100vh;
  background:url("poem1.jpg") center/cover no-repeat;
  position:relative;
}

/* POEM DESIGN */
.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
  z-index:2;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* HEART */
.heart{
  position:absolute;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  color:#ff4d6d;
  animation:float 4s infinite;
}

@keyframes float{
  0%{transform:translateY(-50%) translateX(0);}
  50%{transform:translateY(-60%) translateX(-10px);}
  100%{transform:translateY(-50%) translateX(0);}
}

/* COUPLE PHOTO */
.couple-pic{
  position:absolute;
  right:30px;
  top:65%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.couple-pic img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid white;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #fff;}
  to{box-shadow:0 0 25px #ff4d6d;}
}

/* PETALS */
.petals{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
}

.petal{
  position:absolute;
  top:-20px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="openPage2()">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <div class="anniversary-box">❤️ OUR 1st Anniversary ❤️</div>
  <div class="td-btn" onclick="openPage3()">TD 💖</div>
</div>

<!-- PAGE 3 -->
<div id="page3">

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="poem1-box">
  <span id="typing"></span>
</div>

<div class="heart">💖 💕 💖</div>

<div class="couple-pic">
  <img src="my.jpg">
  <img src="wife.jpg">
</div>

<div class="petals"></div>

</div>

<script>

function openPage2(){
  page1.style.display="none";
  page2.style.display="block";
}

function openPage3(){
  page2.style.display="none";
  page3.style.display="block";
  document.getElementById("bgMusic").play();
  startTyping();
}

/* TYPING EFFECT */
const text = `One year with you, my sweetest light,
Every moment feels so right.

In your smile I found my home,
No more lonely roads to roam.

Like ink on pages, our story stays,
Written in love for endless days.

Happy 1st Anniversary my love 💖`;

let i = 0;

function startTyping(){
  const speed = 50;
  function type(){
    if(i < text.length){
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

/* PETALS */
function createPetal(){
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.innerHTML="🌹";
  petal.style.left=Math.random()*100+"%";
  petal.style.animationDuration=(3+Math.random()*5)+"s";
  document.querySelector(".petals").appendChild(petal);
  setTimeout(()=>{petal.remove();},8000);
}

setInterval(createPetal,300);

</script>

</body>
</html>
