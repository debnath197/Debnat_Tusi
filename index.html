<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  text-align:center;
  font-family:Segoe UI;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
  color:white;
}

/* Full image top */
.main-img{
  width:100%;
  max-height:80vh;
  object-fit:cover;
}

/* TD button */
.td-btn{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  display:inline-block;
  padding:12px 35px;
  border-radius:40px;
  transition:0.3s;
}

.td-btn:hover{
  background:#ffe0ea;
}

/* PAGE 2 BACKGROUND IMAGE */
#page2{
  display:none;
  height:100vh;
  background:url("tusi bari.jpeg") no-repeat;
  background-size:cover;
  background-position:center 50%;
  position:relative;
}

/* HEADING STYLE */
.anniversary-text{
  position:absolute;
  top:40px;
  width:100%;
  font-size:40px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 15px red,0 0 30px pink;
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">

<img src="TAJ.jpeg" class="main-img">

<div class="td-btn" onclick="openPage2()">TD 💖</div>

</div>


<!-- PAGE 2 -->
<div id="page2">

<div class="anniversary-text">❤️ OUR 1st Anniversary ❤️</div>

</div>


<script>

function openPage2(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";
}

</script>

</body>
</html>
