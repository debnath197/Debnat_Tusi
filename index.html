<!DOCTYPE html>
<html>
<head>
<title>Simple Flow</title>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial, sans-serif;
}

.page{
  display:none;
}

/* PAGE 2 IMAGE */
img{
  width:100%;
  height:100vh;
  object-fit:cover;
}

/* PAGE 3 BACKGROUND IMAGE */
.bg{
  background:url("tusi bari.jpeg") no-repeat center center;
  background-size:cover;
  height:100vh;
  position:relative;
  color:white;
}

/* LOVE TEXT */
.love{
  position:absolute;
  top:35%;
  width:100%;
  font-size:55px;
  font-weight:bold;
  text-shadow:0 0 20px red, 0 0 40px pink;
}

/* BUTTON STYLE */
.link, .td{
  font-size:30px;
  cursor:pointer;
  margin-top:20px;
}

/* TD BOTTOM */
.bottom{
  position:absolute;
  bottom:30px;
  width:100%;
}
</style>

</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page" style="display:block;">
  <div class="link" onclick="showPage('page2')">OPEN</div>
</div>

<!-- PAGE 2 (TAJ IMAGE) -->
<div id="page2" class="page">
  <img src="taj.jpg">
  <div class="td" onclick="showPage('page3')">TD</div>
</div>

<!-- PAGE 3 (WEDDING IMAGE BACKGROUND) -->
<div id="page3" class="page bg">
  <div class="love">LOVE ❤️</div>

  <div class="bottom">
    <div class="td" onclick="showPage('page4')">TD</div>
  </div>
</div>

<!-- PAGE 4 (BLANK PAGE) -->
<div id="page4" class="page">
</div>

<script>
function showPage(pageId){
  var pages = document.getElementsByClassName("page");
  for(var i=0;i<pages.length;i++){
    pages[i].style.display="none";
  }
  document.getElementById(pageId).style.display="block";
}
</script>

</body>
</html>
