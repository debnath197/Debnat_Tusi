<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  text-align:center;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
  overflow:hidden;
}

/* PAGE LAYER SYSTEM */
#page1,#page2,#page3,#page4{
  position:absolute;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  display:none;
}

#page1{ display:block; }

/* TD BUTTON */
.td-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  background:white;
  color:#ff4d6d;
  padding:12px 35px;
  border-radius:40px;
  cursor:pointer;
  z-index:1000;
}

/* PAGE 1 */
.main-img{
  width:100%;
  height:80vh;
  object-fit:cover;
}

/* ================= PAGE 2 RESPONSIVE ================= */

#page2{
  position:absolute;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.bg-zoom{
  position:absolute;
  width:100%;
  height:100%;
  background:url("tusi bari1.jpeg") center/cover no-repeat;
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

.left-card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:25px 18px;
  border-radius:25px;
  color:white;
  text-align:center;
}

.left-card h2{font-size:22px;}
.names{font-size:18px;margin:8px 0;}
.date{font-size:16px;}
.from-line{margin-top:6px;font-size:14px;}

.mini-frame{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

.mini-frame img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid white;
  object-fit:cover;
}

.love-counter{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

.side-love-text{
  position:absolute;
  bottom:90px;
  width:100%;
  text-align:center;
  font-size:26px;
  color:white;
  font-weight:bold;
  padding:0 10px;
}

.memory-line{
  position:absolute;
  bottom:60px;
  width:100%;
  text-align:center;
  color:white;
  font-size:16px;
}

/* ================= PAGE 3 ================= */

#page3{
  background:url("poem1.jpg") center/cover no-repeat;
}

.poem1-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
  color:#ffd60a;
  font-size:20px;
  line-height:1.9;
}

.couple-left,.couple-right{
  position:absolute;
  top:65%;
  transform:translateY(-50%);
}

.couple-left{ left:25px; }
.couple-right{ right:25px; }

.couple-left img,.couple-right img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
}

/* ================= PAGE 4 ================= */

#page4{
  background:url("bg2.jpg") center/cover no-repeat;
  perspective:1500px;
  overflow:hidden;
}

.corner-img{
  width:150px;
  height:190px;
  object-fit:cover;
  border-radius:20px;
  position:absolute;
  box-shadow:0 0 25px #ff4d6d;
}

#c1{ top:20px; left:20px; }
#c2{ top:20px; right:20px; }
#c3{ bottom:20px; left:20px; }
#c4{ bottom:20px; right:20px; }

.memory-container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:350px;
  height:350px;
  transform-style:preserve-3d;
  animation:rotate 30s linear infinite;
}

@keyframes rotate{
  from{transform:translate(-50%,-50%) rotateY(0deg);}
  to{transform:translate(-50%,-50%) rotateY(360deg);}
}

.memory-container img{
  position:absolute;
  width:220px;
  height:280px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,77,109,0.9);
}

.memory-container img:nth-child(1){ transform:rotateY(0deg) translateZ(500px); }
.memory-container img:nth-child(2){ transform:rotateY(45deg) translateZ(500px); }
.memory-container img:nth-child(3){ transform:rotateY(90deg) translateZ(500px); }
.memory-container img:nth-child(4){ transform:rotateY(135deg) translateZ(500px); }
.memory-container img:nth-child(5){ transform:rotateY(180deg) translateZ(500px); }
.memory-container img:nth-child(6){ transform:rotateY(225deg) translateZ(500px); }
.memory-container img:nth-child(7){ transform:rotateY(270deg) translateZ(500px); }
.memory-container img:nth-child(8){ transform:rotateY(315deg) translateZ(500px); }

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <img src="TAJ.jpeg" class="main-img">
  <div class="td-btn" onclick="showPage('page2')">TD 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2">
<div class="bg-zoom"></div>

<div class="left-card">
  <h2>❤️ Our 1st Anniversary ❤️</h2>
  <div class="names">Debnath 💖 Tusi</div>
  <div class="date">06 / 03 / 2026</div>
  <div class="from-line">📍 From 06-03-2025 → Forever ♾️</div>

  <div class="mini-frame">
    <img src="my.jpg">
    <img src="wife.jpg">
  </div>

  <div class="love-counter">
    ⏳ <span id="days"></span> Days<br>
    ⏱️ <span id="hours"></span> Hours<br>
    💞 <span id="minutes"></span> Minutes
  </div>
</div>

<div class="side-love-text">One Year Of Endless Love 💖</div>
<p class="memory-line">365 Days of Togetherness 💞</p>

<div class="td-btn" onclick="showPage('page3'); startTyping();">TD 💖</div>
</div>

<!-- PAGE 3 -->
<div id="page3">
<div class="poem1-box"><span id="typing"></span></div>
<div class="couple-left"><img src="my.jpg"></div>
<div class="couple-right"><img src="wife.jpg"></div>
<div class="td-btn" onclick="showPage('page4')">TD 💖</div>
</div>

<!-- PAGE 4 -->
<div id="page4">
<img src="image1.jpeg" class="corner-img" id="c1">
<img src="image2.jpeg" class="corner-img" id="c2">
<img src="image3.jpeg" class="corner-img" id="c3">
<img src="image4.jpeg" class="corner-img" id="c4">

<div class="memory-container">
<img src="image5.JPG">
<img src="image6.JPG">
<img src="image7.jpg">
<img src="image8.jpg">
<img src="image9.JPG">
<img src="image10.JPG">
<img src="image11.JPG">
<img src="image12.jpg">
</div>
</div>

<script>
function showPage(page){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="none";
  document.getElementById("page3").style.display="none";
  document.getElementById("page4").style.display="none";
  document.getElementById(page).style.display="block";
}

const startDate = new Date("March 6, 2025");
setInterval(()=>{
const now = new Date();
const diff = now - startDate;
document.getElementById("days").innerHTML = Math.floor(diff / (1000*60*60*24));
document.getElementById("hours").innerHTML = Math.floor(diff / (1000*60*60));
document.getElementById("minutes").innerHTML = Math.floor(diff / (1000*60));
},1000);

const text=`Happy 1st Anniversary my love 💖`;
let i=0;
function startTyping(){
document.getElementById("typing").innerHTML="";
i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();
}
</script>

</body>
</html>
