<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memory ❤️</title>

<style>

body{
  margin:0;
  text-align:center;
  font-family:Segoe UI;
  background:linear-gradient(to right,#ff758f,#ff7eb3);
  color:white;
  overflow:hidden;
}

/* PAGE 1 IMAGE */
.main-img{
  width:100%;
  max-height:80vh;
  object-fit:cover;
}

/* TD BUTTON */
.td-btn{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  display:inline-block;
  padding:12px 35px;
  border-radius:40px;
  transition:0.3s;
}

.td-btn:hover{
  background:#ffe0ea;
  transform:scale(1.05);
}

/* PAGE 2 BACKGROUND */
#page2{
  display:none;
  height:100vh;
  background:url("tusi bari.jpeg") no-repeat center;
  background-size:cover;
  position:relative;
}

/* GLASS ANNIVERSARY BOX */
.anniversary-box{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 35px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  box-shadow:0 0 25px rgba(255,0,98,0.6);
  animation:fadeSlide 2s ease;
}

/* MAIN TEXT */
.anniversary-text{
  font-size:38px;
  font-weight:bold;
  background:linear-gradient(45deg,#ff0057,#ff8a00,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:2px;
}

/* SUB TEXT */
.anniversary-sub{
  font-size:18px;
  color:white;
  margin-top:5px;
  letter-spacing:3px;
}

/* FLOATING HEARTS */
.heart{
  position:absolute;
  color:#ff4d6d;
  font-size:20px;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{
    transform:translateY(100vh);
    opacity:1;
  }
  to{
    transform:translateY(-10vh);
    opacity:0;
  }
}

/* TEXT ANIMATION */
@keyframes fadeSlide{
  from{
    opacity:0;
    transform:translate(-50%,-50px);
  }
  to{
    opacity:1;
    transform:translate(-50%,0);
  }
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">

<img src="TAJ.jpeg" class="main-img">

<div class="td-btn" onclick="openPage2()">TD 💖</div>

</div>


<!-- PAGE 2 -->
<div id="page2">

  <div class="anniversary-box">
      <div class="anniversary-text">❤️ OUR 1st Anniversary ❤️</div>
      <div class="anniversary-sub">Together Forever 💖</div>
  </div>

</div>


<script>

function openPage2(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";
  createHearts();
}

/* FLOATING HEARTS FUNCTION */
function createHearts(){
  for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"%";
    heart.style.animationDuration=(4+Math.random()*3)+"s";
    document.getElementById("page2").appendChild(heart);
  }
}

</script>

</body>
</html>
